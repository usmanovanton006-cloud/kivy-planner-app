name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install buildozer
        
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = TaskPlanner
package.name = plannerapp
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv
version = 1.0.0
requirements = python3,kivy==2.1.0,kivymd==1.1.1,plyer
orientation = portrait
presplash.filename = logo.png
icon.filename = logo.png
android.api = 30
android.minapi = 21
android.ndk = 23b
android.sdk = 30
android.ndk_api = 21
android.permissions = INTERNET,POST_NOTIFICATIONS,VIBRATE
android.accept_sdk_license = True

[buildozer]
log_level = 2
EOF
        
    - name: Build APK
      run: buildozer -v android debug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: planner-app
        path: ./bin/*.apk
