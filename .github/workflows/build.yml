name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install buildozer
    
    - name: Configure Buildozer
      run: |
        buildozer init
    
    - name: Update buildozer.spec
      run: |
        sed -i 's/title = .*/title = TaskPlanner/' buildozer.spec
        sed -i 's/package.name = .*/package.name = plannerapp/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy==2.1.0,kivymd==1.0.2,plyer/' buildozer.spec
        sed -i 's/icon.filename = .*/icon.filename = logo.png/' buildozer.spec
        sed -i 's/presplash.filename = .*/presplash.filename = logo.png/' buildozer.spec
        sed -i 's/android.api = .*/android.api = 30/' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 23b/' buildozer.spec
        sed -i 's/android.sdk = .*/android.sdk = 30/' buildozer.spec
        sed -i 's/android.ndk_api = .*/android.ndk_api = 21/' buildozer.spec
    
    - name: Build APK
      run: buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: planner-app
        path: ./bin/*.apk
