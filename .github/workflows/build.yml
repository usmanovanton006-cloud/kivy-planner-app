name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Buildozer
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          pip install buildozer
      - name: Create spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = TaskPlanner' >> buildozer.spec
          echo 'package.name = plannerapp' >> buildozer.spec
          echo 'package.domain = org.example' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py,png,jpg,kv' >> buildozer.spec
          echo 'version = 1.0.0' >> buildozer.spec
          echo 'requirements = python3,kivy==2.1.0,kivymd==1.0.2,plyer' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'presplash.filename = logo.png' >> buildozer.spec
          echo 'icon.filename = logo.png' >> buildozer.spec
          echo 'android.api = 30' >> buildozer.spec
          echo 'android.minapi = 21' >> buildozer.spec
          echo 'android.ndk = 23b' >> buildozer.spec
          echo 'android.sdk = 30' >> buildozer.spec
          echo 'android.ndk_api = 21' >> buildozer.spec
          echo 'android.permissions = INTERNET,POST_NOTIFICATIONS,VIBRATE' >> buildozer.spec
          echo 'android.accept_sdk_license = True' >> buildozer.spec
          echo '' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec
      - name: Build APK
        run: buildozer -v android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: planner-app
          path: ./bin/*.apk
